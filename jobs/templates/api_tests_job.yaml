- job-template:
    name: 'api_tests'
    desciption: "<h3 style='color: red;'>api tests runner</h3>"
    project-type: pipeline
    concurrent: true
    parameters:
      - string:
          name: REFSPEC
          description: ""
          default: main
      - text:
          name: YAML_CONFIG
          description: "PROFILE: api | ui | appium"
          default: |
            PROFILE: api
#            base_url: https://otus.ru
#            remote: false
    pipeline-scm:
      scm:
        - api-tests-scm
      script-path: ./pipelines/api_tests.groovy
#      script-path: jenkins/api_tests.groovy
