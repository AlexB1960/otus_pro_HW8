- job-template:
    name: 'api_tests'
    desciption: "<h3 style='color: red;'>api tests runner</h3>"
    project-type: pipeline
    concurrent: true
    parameters:
      - string:
          name: REFSPEC
          description: ""
          default: main
      - text:
          name: CONFIG
          default: |
            browser: chrome
            base_url: https://otus.ru
            remote: false
    pipeline-scm:
      scm:
        - api_tests_scm
      script-path: jenkins/api_tests.groovy
#      script-path: burlaka_jenkins/pipelines/api_tests.groovy
