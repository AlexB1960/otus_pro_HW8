- job-template:
    name: 'ui_tests'
    desciption: "<h3 style='color: red;'>ui tests runner</h3>"
    project-type: pipeline
    concurrent: true
    parameters:
      - string:
          name: REFSPEC
          description: ""
          default: main
      - text:
          name: YAML_CONFIG
          description: "PROFILE: api | ui | appium"
          default: |
            PROFILE: ui
#            browser: chrome
#            base_url: https://otus.ru
#            remote: false
    pipeline-scm:
      scm:
        - ui-tests-scm
      script-path: ./pipelines/ui_tests.groovy
#      script-path: jenkins/ui_tests.groovy
